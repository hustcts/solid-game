<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🎮 几何体配对大作战 - Solid Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* 游戏容器 */
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* 顶部信息栏 */
        #header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .header-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .level-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .score-display {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        /* 3D 画布 */
        #canvas-container {
            width: 100%;
            height: calc(100vh - 80px);
            margin-top: 80px;
            position: relative;
            z-index: 1;
            background: rgba(240, 244, 248, 0.5);
            overflow: hidden;
        }
        
        /* Canvas 样式 */
        #canvas-container canvas {
            display: block !important;
            width: 100% !important;
            height: 100% !important;
            touch-action: none;
        }

        /* 目标区域（影子） */
        #target-zone {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
            border: 4px dashed rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            pointer-events: none;
            z-index: 50;
        }

        #target-label {
            color: white;
            font-size: 18px;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* 底部选择区 */
        #selection-zone {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.2);
            z-index: 100;
            pointer-events: auto;
        }

        .shape-option {
            width: 100px;
            height: 100px;
            border: 3px solid #667eea;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            background: white;
        }

        .shape-option:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .shape-option.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: #764ba2;
            transform: scale(1.15);
        }

        /* 提示文字 */
        #hint-text {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 16px;
            color: #666;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 90;
            white-space: nowrap;
        }

        /* 消息提示 */
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px 60px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 200;
            display: none;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        #message h2 {
            font-size: 36px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #message p {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }

        #message button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #message button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* 成功动画 */
        .success {
            animation: celebrate 0.6s ease;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 进度条 */
        #progress-container {
            position: absolute;
            top: 100px;
            right: 30px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        #progress-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        #progress-bar {
            width: 150px;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #header {
                height: 60px;
                padding: 0 10px;
            }

            .level-badge, .score-display {
                padding: 6px 12px;
                font-size: 14px;
            }

            #canvas-container {
                height: calc(100vh - 60px);
                margin-top: 60px;
            }

            #hint-text {
                top: 80px;
                font-size: 14px;
                padding: 8px 15px;
                max-width: 90%;
                white-space: normal;
            }

            #selection-zone {
                bottom: 5px;
                padding: 8px;
                gap: 8px;
            }

            .shape-option {
                width: 55px;
                height: 55px;
                font-size: 26px;
            }

            #target-zone {
                width: 220px;
                height: 220px;
                top: 40%;
            }

            #target-label {
                font-size: 16px;
            }

            #progress-container {
                top: 80px;
                right: 10px;
                padding: 10px;
            }

            #progress-bar {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- 顶部信息栏 -->
        <div id="header">
            <div class="header-item">
                <div class="level-badge">🎯 第 <span id="level">1</span> 关</div>
            </div>
            <div class="header-item">
                <div class="score-display">⭐ <span id="score">0</span> 分</div>
            </div>
        </div>

        <!-- 进度条 -->
        <div id="progress-container">
            <div id="progress-label">本关进度</div>
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>

        <!-- 3D 画布 -->
        <div id="canvas-container"></div>

        <!-- 目标区域 -->
        <div id="target-zone">
            <div id="target-label">🎯 把正确的几何体<br>拖到这里！</div>
        </div>
        
        <!-- 提示文字 -->
        <div id="hint-text">💡 提示：可以直接拖拽 3D 几何体，或者点击下方的按钮</div>
        
        <!-- 调试信息（可隐藏） -->
        <div id="debug-info" style="position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #0f0; padding: 10px; font-size: 12px; z-index: 1000; display: none; font-family: monospace;">
            <div>Screen: <span id="debug-screen"></span></div>
            <div>Shapes: <span id="debug-shapes">0</span></div>
            <div>FPS: <span id="debug-fps">0</span></div>
        </div>

        <!-- 底部选择区 -->
        <div id="selection-zone">
            <!-- 动态生成选项 -->
        </div>

        <!-- 消息弹窗 -->
        <div id="message">
            <h2 id="message-title">🎉 太棒了！</h2>
            <p id="message-content">你成功完成了这一关！</p>
            <button id="message-btn">继续下一关</button>
        </div>
    </div>

    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="js/shapes.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>

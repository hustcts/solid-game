<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拖拽测试 - 简化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div id="info">
        <div><strong>拖拽测试</strong></div>
        <div>🔴 红色方块 = 可拖拽</div>
        <div>📍 拖到绿色区域</div>
        <hr style="margin: 10px 0;">
        <div id="status">状态：初始化中...</div>
    </div>
    
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const status = document.getElementById('status');
        const container = document.getElementById('canvas-container');
        
        // 创建场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202040);
        
        // 创建相机
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        // 创建渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        
        // 创建红色方块（可拖拽）
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const cube = new THREE.Mesh(geometry, material);
        cube.position.x = -2;
        cube.userData.draggable = true;
        scene.add(cube);
        
        // 创建绿色目标区域
        const targetGeo = new THREE.PlaneGeometry(2, 2);
        const targetMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
        const target = new THREE.Mesh(targetGeo, targetMat);
        target.position.x = 2;
        scene.add(target);
        
        // 添加光源
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));
        
        // 拖拽逻辑
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selected = null;
        let isDragging = false;
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        
        renderer.domElement.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(cube);
            if (intersects.length > 0) {
                selected = cube;
                isDragging = true;
                status.textContent = '状态：选中红色方块，拖动鼠标！';
                cube.material.color.setHex(0xffff00);
            }
        });
        
        renderer.domElement.addEventListener('mousemove', (e) => {
            if (!isDragging || !selected) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const targetVec = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, targetVec);
            selected.position.x = targetVec.x;
            selected.position.y = targetVec.y;
        });
        
        renderer.domElement.addEventListener('mouseup', () => {
            if (selected) {
                const dist = selected.position.distanceTo(target.position);
                if (dist < 1.5) {
                    status.textContent = '状态：✅ 成功拖到目标！';
                    selected.material.color.setHex(0x00ff00);
                } else {
                    status.textContent = '状态：❌ 未到达目标，请重试';
                    selected.material.color.setHex(0xff0000);
                }
                selected.position.x = -2;
                selected.position.y = 0;
            }
            isDragging = false;
            selected = null;
        });
        
        status.textContent = '状态：就绪，点击红色方块并拖动！';
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
